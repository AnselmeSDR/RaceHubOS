<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="track" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#374151"/>
      <stop offset="100%" style="stop-color:#4b5563"/>
    </linearGradient>
    <linearGradient id="car" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ef4444"/>
      <stop offset="100%" style="stop-color:#dc2626"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
    <linearGradient id="silver" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#d1d5db"/>
      <stop offset="100%" style="stop-color:#9ca3af"/>
    </linearGradient>
    <linearGradient id="bronze" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fb923c"/>
      <stop offset="100%" style="stop-color:#ea580c"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="90" fill="url(#bg)"/>

  <!-- TRACK (oval shape with slot groove) -->
  <g transform="translate(40, 80)">
    <!-- Track surface -->
    <path
      d="M80 120
         L350 120
         Q420 120 420 190
         L420 210
         Q420 280 350 280
         L80 280
         Q10 280 10 210
         L10 190
         Q10 120 80 120 Z"
      fill="url(#track)"
      stroke="#1f2937"
      stroke-width="3"
    />

    <!-- Slot groove (purple line in middle of track) -->
    <path
      d="M80 200
         L350 200
         Q390 200 390 200
         M40 200
         L80 200"
      fill="none"
      stroke="url(#accent)"
      stroke-width="4"
      stroke-linecap="round"
    />

    <!-- Track borders (white lines) -->
    <path
      d="M80 135 L350 135 Q405 135 405 190 L405 210 Q405 265 350 265 L80 265 Q25 265 25 210 L25 190 Q25 135 80 135"
      fill="none"
      stroke="#fff"
      stroke-width="2"
      stroke-dasharray="15 10"
    />

    <!-- SLOT CAR (top view) -->
    <g transform="translate(280, 200)">
      <!-- Car body -->
      <rect x="-24" y="-12" width="48" height="24" rx="8" fill="url(#car)"/>
      <!-- Windshield -->
      <rect x="-8" y="-8" width="18" height="16" rx="4" fill="#1e293b" opacity="0.8"/>
      <!-- Rear spoiler -->
      <rect x="-22" y="-14" width="6" height="28" rx="2" fill="#1e293b"/>
      <!-- Front -->
      <rect x="18" y="-6" width="6" height="12" rx="2" fill="#fbbf24"/>
      <!-- Number -->
      <text x="6" y="5" font-family="Arial Black" font-size="12" fill="#fff" font-weight="bold">7</text>

      <!-- GUIDE PIN (underneath car - the key slot car element!) -->
      <rect x="-3" y="10" width="6" height="10" rx="1" fill="url(#accent)"/>
      <rect x="-1" y="18" width="2" height="6" fill="#4f46e5"/>
    </g>

    <!-- Speed lines behind car -->
    <g stroke="#fff" stroke-width="2" stroke-linecap="round" opacity="0.5">
      <line x1="220" y1="192" x2="240" y2="192"/>
      <line x1="210" y1="200" x2="235" y2="200"/>
      <line x1="220" y1="208" x2="240" y2="208"/>
    </g>
  </g>

  <!-- CHECKERED FLAG -->
  <g transform="translate(380, 50)">
    <!-- Flag pole -->
    <rect x="0" y="0" width="6" height="100" fill="#78716c" rx="2"/>

    <!-- Flag waving -->
    <g transform="translate(6, 5)">
      <path d="M0 0 Q30 10 60 0 Q90 -10 100 0 L100 50 Q70 60 40 50 Q10 40 0 50 Z" fill="#fff"/>
      <!-- Checker pattern -->
      <g fill="#1e293b">
        <rect x="0" y="0" width="12" height="12"/>
        <rect x="24" y="0" width="12" height="12"/>
        <rect x="48" y="0" width="12" height="12"/>
        <rect x="72" y="0" width="12" height="12"/>
        <rect x="12" y="12" width="12" height="12"/>
        <rect x="36" y="12" width="12" height="12"/>
        <rect x="60" y="12" width="12" height="12"/>
        <rect x="84" y="12" width="12" height="12"/>
        <rect x="0" y="24" width="12" height="12"/>
        <rect x="24" y="24" width="12" height="12"/>
        <rect x="48" y="24" width="12" height="12"/>
        <rect x="72" y="24" width="12" height="12"/>
        <rect x="12" y="36" width="12" height="12"/>
        <rect x="36" y="36" width="12" height="12"/>
        <rect x="60" y="36" width="12" height="12"/>
        <rect x="84" y="36" width="12" height="12"/>
      </g>
    </g>
  </g>

  <!-- LEADERBOARD -->
  <g transform="translate(40, 380)">
    <!-- Board background -->
    <rect x="0" y="0" width="200" height="110" rx="12" fill="#1e293b" stroke="#374151" stroke-width="2"/>

    <!-- Header -->
    <rect x="0" y="0" width="200" height="28" rx="12" fill="url(#accent)"/>
    <rect x="0" y="14" width="200" height="14" fill="url(#accent)"/>
    <text x="100" y="19" font-family="Arial" font-size="12" fill="#fff" text-anchor="middle" font-weight="bold">LEADERBOARD</text>

    <!-- Position 1 -->
    <g transform="translate(10, 38)">
      <rect x="0" y="0" width="22" height="22" rx="6" fill="url(#gold)"/>
      <text x="11" y="16" font-family="Arial Black" font-size="14" fill="#1e293b" text-anchor="middle">1</text>
      <text x="32" y="16" font-family="Arial" font-size="13" fill="#fff" font-weight="bold">Driver A</text>
      <text x="170" y="16" font-family="Arial" font-size="12" fill="#22c55e" text-anchor="end">1:23.456</text>
    </g>

    <!-- Position 2 -->
    <g transform="translate(10, 63)">
      <rect x="0" y="0" width="22" height="22" rx="6" fill="url(#silver)"/>
      <text x="11" y="16" font-family="Arial Black" font-size="14" fill="#1e293b" text-anchor="middle">2</text>
      <text x="32" y="16" font-family="Arial" font-size="13" fill="#fff" font-weight="bold">Driver B</text>
      <text x="170" y="16" font-family="Arial" font-size="12" fill="#fff" text-anchor="end">+0.234</text>
    </g>

    <!-- Position 3 -->
    <g transform="translate(10, 88)">
      <rect x="0" y="0" width="22" height="22" rx="6" fill="url(#bronze)"/>
      <text x="11" y="16" font-family="Arial Black" font-size="14" fill="#1e293b" text-anchor="middle">3</text>
      <text x="32" y="16" font-family="Arial" font-size="13" fill="#fff" font-weight="bold">Driver C</text>
      <text x="170" y="16" font-family="Arial" font-size="12" fill="#fff" text-anchor="end">+0.567</text>
    </g>
  </g>

  <!-- HUB indicator (network symbol) -->
  <g transform="translate(280, 420)">
    <circle cx="40" cy="40" r="35" fill="none" stroke="url(#accent)" stroke-width="3"/>
    <circle cx="40" cy="40" r="12" fill="url(#accent)"/>
    <!-- Connection dots -->
    <circle cx="40" cy="10" r="6" fill="url(#accent)"/>
    <circle cx="40" cy="70" r="6" fill="url(#accent)"/>
    <circle cx="10" cy="40" r="6" fill="url(#accent)"/>
    <circle cx="70" cy="40" r="6" fill="url(#accent)"/>
    <!-- Connection lines -->
    <line x1="40" y1="28" x2="40" y2="16" stroke="url(#accent)" stroke-width="2"/>
    <line x1="40" y1="52" x2="40" y2="64" stroke="url(#accent)" stroke-width="2"/>
    <line x1="28" y1="40" x2="16" y2="40" stroke="url(#accent)" stroke-width="2"/>
    <line x1="52" y1="40" x2="64" y2="40" stroke="url(#accent)" stroke-width="2"/>
  </g>

  <!-- OS text indicator -->
  <g transform="translate(380, 450)">
    <text font-family="Monaco, monospace" font-size="18" fill="#6366f1" opacity="0.8">&lt;/&gt;</text>
  </g>

</svg>
