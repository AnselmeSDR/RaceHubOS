<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#ef4444"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <circle cx="16" cy="16" r="15" fill="url(#bg)" stroke="url(#accent)" stroke-width="1"/>

  <!-- Track ring -->
  <circle cx="16" cy="16" r="10" fill="none" stroke="#475569" stroke-width="4"/>

  <!-- Slot -->
  <circle cx="16" cy="16" r="10" fill="none" stroke="#6366f1" stroke-width="1"/>

  <!-- Center hub -->
  <circle cx="16" cy="16" r="4" fill="url(#accent)"/>

  <!-- Car indicator -->
  <circle cx="16" cy="5" r="2" fill="#ef4444"/>
</svg>
